---
services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - VERSION=docker
      # Set your claim token from https://plex.tv/claim or leave empty
      - PLEX_CLAIM=
    volumes:
      - ./config:/config
      - /path/to/shows:/tv
      - /path/to/movies:/movies
    restart: unless-stopped

