services:
    kavita:
        image: jvmilazz0/kavita:latest
        container_name: kavita
        volumes:
            - /path/to/manga:/manga
            - /path/to/comics:/comics
            - /path/to/books:/books
            - ./config:/kavita/config
        environment:
            - TZ=Etc/UTC
        ports:
            - "5000:5000"
        restart: unless-stopped
